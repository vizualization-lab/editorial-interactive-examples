<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-gray-50 text-gray-900">
  <!-- Header -->
  <header class="bg-white/70 backdrop-blur-xl border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-500/20">
        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-editorial tracking-tight text-gray-900">Editorial Interactive Story Examples</h1>
        <p class="text-[11px] text-gray-400 font-medium">{{ videos.length }} videos</p>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-6 lg:px-8 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Video Player -->
      <div class="flex-1 min-w-0">
        <div class="rounded-2xl overflow-hidden shadow-2xl shadow-gray-900/10 ring-1 ring-gray-900/10">
          <app-video-player
            [src]="videoSrc()"
            [title]="playerTitle()"
          />
        </div>

        <!-- Now Playing Info -->
        <div class="mt-5 space-y-2">
          <span
            [class]="'inline-flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wider px-2.5 py-1 rounded-full ' + getSourceBadge(selectedVideo().source)"
          >
            <span [class]="'w-1.5 h-1.5 rounded-full ' + getSourceDot(selectedVideo().source)"></span>
            {{ selectedVideo().source }}
          </span>
          <h2 class="text-2xl font-editorial text-gray-900 leading-snug">{{ selectedVideo().title }}</h2>
        </div>
      </div>

      <!-- Playlist Sidebar -->
      <aside class="lg:w-80 xl:w-96 shrink-0">
        <div class="sticky top-24">
          <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400">
              Up Next
            </h3>
            <span class="text-[10px] font-mono text-gray-300">{{ selectedIndex() + 1 }}/{{ videos.length }}</span>
          </div>

          <div class="space-y-1.5 max-h-[calc(100vh-12rem)] overflow-y-auto pr-1 playlist-scroll">
            @for (video of videos; track video.file; let i = $index) {
              <button
                [class]="'w-full flex items-start gap-3 p-3 rounded-xl text-left transition-all duration-200 cursor-pointer ' +
                  (i === selectedIndex()
                    ? 'bg-white shadow-md shadow-gray-900/5 ring-1 ring-gray-200'
                    : 'hover:bg-white/60')"
                (click)="selectVideo(i)"
              >
                <!-- Index / Now Playing indicator -->
                <div [class]="'w-7 h-7 rounded-lg flex items-center justify-center shrink-0 mt-0.5 transition-colors ' +
                  (i === selectedIndex()
                    ? 'bg-gradient-to-br from-violet-500 to-indigo-600 shadow-sm shadow-violet-500/20'
                    : 'bg-gray-100')"
                >
                  @if (i === selectedIndex()) {
                    <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M8 5v14l11-7z"/>
                    </svg>
                  } @else {
                    <span class="text-[10px] text-gray-400 font-semibold font-mono">
                      {{ i + 1 }}
                    </span>
                  }
                </div>

                <!-- Video Info -->
                <div class="min-w-0 flex-1">
                  <p [class]="'text-[13px] font-medium leading-snug line-clamp-2 ' +
                    (i === selectedIndex() ? 'text-gray-900' : 'text-gray-600')"
                  >
                    {{ video.title }}
                  </p>
                  <span
                    [class]="'inline-flex items-center gap-1 text-[10px] font-semibold uppercase tracking-wider mt-1.5 ' +
                      (i === selectedIndex() ? 'text-violet-500' : 'text-gray-400')"
                  >
                    <span [class]="'w-1 h-1 rounded-full ' + getSourceDot(video.source)"></span>
                    {{ video.source }}
                  </span>
                </div>
              </button>
            }
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>
