<div class="min-h-screen bg-zinc-950 text-white">
  <!-- Header -->
  <header class="border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-sky-500 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <h1 class="text-lg font-semibold tracking-tight">Editorial Examples</h1>
      <span class="text-xs text-white/40 font-mono ml-2">{{ videos.length }} videos</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col lg:flex-row gap-6">
      <!-- Video Player -->
      <div class="flex-1 min-w-0">
        <app-video-player
          [src]="videoSrc"
          [title]="selectedVideo.source + ' — ' + selectedVideo.title"
        />

        <!-- Now Playing Info -->
        <div class="mt-4 space-y-2">
          <div class="flex items-center gap-2">
            <span
              class="text-[11px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full"
              [ngClass]="getSourceColor(selectedVideo.source)"
            >
              {{ selectedVideo.source }}
            </span>
          </div>
          <h2 class="text-xl font-semibold text-white/90">{{ selectedVideo.title }}</h2>
        </div>
      </div>

      <!-- Playlist Sidebar -->
      <aside class="lg:w-80 xl:w-96 shrink-0">
        <div class="sticky top-8">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-white/40 mb-3 px-1">
            Playlist
          </h3>

          <div class="space-y-1 max-h-[calc(100vh-12rem)] overflow-y-auto pr-1 playlist-scroll">
            <button
              *ngFor="let video of videos; let i = index"
              class="w-full flex items-start gap-3 p-3 rounded-xl text-left transition-all duration-150"
              [ngClass]="i === selectedIndex
                ? 'bg-white/10 ring-1 ring-white/10'
                : 'hover:bg-white/5'"
              (click)="selectVideo(i)"
            >
              <!-- Index / Now Playing indicator -->
              <div class="w-6 h-6 rounded-full flex items-center justify-center shrink-0 mt-0.5"
                [ngClass]="i === selectedIndex ? 'bg-sky-500' : 'bg-white/5'"
              >
                <svg *ngIf="i === selectedIndex" class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7z"/>
                </svg>
                <span *ngIf="i !== selectedIndex" class="text-[10px] text-white/40 font-mono">
                  {{ i + 1 }}
                </span>
              </div>

              <!-- Video Info -->
              <div class="min-w-0 flex-1">
                <p class="text-sm font-medium leading-snug truncate"
                  [ngClass]="i === selectedIndex ? 'text-white' : 'text-white/70'"
                >
                  {{ video.title }}
                </p>
                <span
                  class="text-[10px] font-semibold uppercase tracking-wider mt-1 inline-block px-1.5 py-0.5 rounded"
                  [ngClass]="getSourceColor(video.source)"
                >
                  {{ video.source }}
                </span>
              </div>
            </button>
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>
