<div
  class="video-container relative w-full rounded-2xl overflow-hidden bg-black group"
  (mousemove)="onMouseMove()"
  (mouseleave)="onMouseLeave()"
>
  <!-- Video Element -->
  <video
    #videoEl
    class="w-full aspect-video object-contain cursor-pointer"
    [src]="src"
    (loadedmetadata)="onLoadedMetadata()"
    (timeupdate)="onTimeUpdate()"
    (ended)="onVideoEnded()"
    (click)="togglePlay()"
    preload="metadata"
  ></video>

  <!-- Big Play Button (center overlay when paused) -->
  <div
    *ngIf="!isPlaying"
    class="absolute inset-0 flex items-center justify-center cursor-pointer"
    (click)="togglePlay()"
  >
    <div class="w-20 h-20 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center transition-transform hover:scale-110">
      <svg class="w-10 h-10 text-white ml-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
  </div>

  <!-- Title Bar -->
  <div
    class="absolute top-0 left-0 right-0 p-4 bg-gradient-to-b from-black/60 to-transparent transition-opacity duration-300"
    [class.opacity-0]="!showControls && isPlaying"
  >
    <h2 class="text-white text-sm font-medium truncate">{{ title }}</h2>
  </div>

  <!-- Controls Overlay -->
  <div
    class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent pt-12 pb-4 px-4 transition-opacity duration-300"
    [class.opacity-0]="!showControls && isPlaying"
  >
    <!-- Progress Bar -->
    <div
      #progressBar
      class="progress-bar relative w-full h-1.5 bg-white/20 rounded-full mb-4 cursor-pointer group/progress hover:h-2.5 transition-all"
      (click)="seekTo($event)"
    >
      <!-- Buffered -->
      <div
        class="absolute top-0 left-0 h-full bg-white/30 rounded-full"
        [style.width.%]="buffered"
      ></div>
      <!-- Progress -->
      <div
        class="absolute top-0 left-0 h-full bg-sky-500 rounded-full transition-none"
        [style.width.%]="progress"
      >
        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3.5 h-3.5 bg-white rounded-full shadow-lg opacity-0 group-hover/progress:opacity-100 transition-opacity"></div>
      </div>
    </div>

    <!-- Controls Row -->
    <div class="flex items-center justify-between gap-3">
      <!-- Left Controls -->
      <div class="flex items-center gap-2">
        <!-- Play/Pause -->
        <button
          class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white"
          (click)="togglePlay()"
        >
          <!-- Play Icon -->
          <svg *ngIf="!isPlaying" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <!-- Pause Icon -->
          <svg *ngIf="isPlaying" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <!-- Skip Back -->
        <button
          class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white/80 hover:text-white"
          (click)="skip(-10)"
          title="Back 10s"
        >
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12.5 3C7.81 3 4 6.81 4 11.5H1l4 4 4-4H6c0-3.58 2.92-6.5 6.5-6.5s6.5 2.92 6.5 6.5-2.92 6.5-6.5 6.5c-1.77 0-3.38-.71-4.55-1.87l-1.42 1.42A8.46 8.46 0 0012.5 20c4.69 0 8.5-3.81 8.5-8.5S17.19 3 12.5 3z"/>
            <text x="10" y="15" font-size="7" font-weight="bold" fill="currentColor" text-anchor="middle">10</text>
          </svg>
        </button>

        <!-- Skip Forward -->
        <button
          class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white/80 hover:text-white"
          (click)="skip(10)"
          title="Forward 10s"
        >
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M11.5 3c4.69 0 8.5 3.81 8.5 8.5H23l-4 4-4-4h3c0-3.58-2.92-6.5-6.5-6.5S5 7.92 5 11.5 7.92 18 11.5 18c1.77 0 3.38-.71 4.55-1.87l1.42 1.42A8.46 8.46 0 0111.5 20C6.81 20 3 16.19 3 11.5S6.81 3 11.5 3z"/>
            <text x="14" y="15" font-size="7" font-weight="bold" fill="currentColor" text-anchor="middle">10</text>
          </svg>
        </button>

        <!-- Volume -->
        <div class="flex items-center gap-1 group/vol">
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white/80 hover:text-white"
            (click)="toggleMute()"
          >
            <svg *ngIf="!isMuted && volume > 0.5" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg *ngIf="!isMuted && volume > 0 && volume <= 0.5" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
            </svg>
            <svg *ngIf="isMuted || volume === 0" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
          <input
            type="range"
            min="0"
            max="1"
            step="0.05"
            [value]="volume"
            (input)="setVolume($event)"
            class="volume-slider w-0 group-hover/vol:w-20 transition-all duration-200 opacity-0 group-hover/vol:opacity-100"
          />
        </div>

        <!-- Time -->
        <span class="text-white/70 text-xs font-mono ml-1">
          {{ formatTime(currentTime) }} / {{ formatTime(duration) }}
        </span>
      </div>

      <!-- Right Controls -->
      <div class="flex items-center gap-2">
        <!-- Fullscreen -->
        <button
          class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white/80 hover:text-white"
          (click)="toggleFullscreen()"
        >
          <svg *ngIf="!isFullscreen" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
          </svg>
          <svg *ngIf="isFullscreen" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
